version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development  # Use development stage for docker-compose (includes node --watch)
    container_name: kloak
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      NODE_ENV: "development"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/kloak"
      KEYCLOAK_BASE_URL: "http://keycloak:8080"
      KEYCLOAK_REALM_ADMIN_USER: "admin"
      KEYCLOAK_REALM_ADMIN_PASSWORD: "admin"
      KEYCLOAK_CLIENT_ID: "kloak"
      KEYCLOAK_CLIENT_SECRET: "secret"
      AWS_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
    volumes:
      - ./src:/app/src  # Mount source for live reload
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: kloak-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: keycloak/keycloak:25.0.0
    container_name: kloak-keycloak
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://postgres:5432/keycloak"
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
    command:
      - start-dev
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s

  # Optional: Add to keycloak postgres setup
  # postgres_keycloak:
  #   image: postgres:15-alpine
  #   container_name: kloak-keycloak-postgres
  #   environment:
  #     POSTGRES_USER: keycloak
  #     POSTGRES_PASSWORD: keycloak
  #     POSTGRES_DB: keycloak
  #   volumes:
  #     - keycloak_data:/var/lib/postgresql/data
  #   restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  # keycloak_data:
  #   driver: local
